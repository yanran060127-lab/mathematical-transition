<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>秩序的翻译 · 动态版</title>
<style>
  :root { --ease: cubic-bezier(0.22, 1, 0.36, 1); }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #08070f;
    overflow: hidden;
    font-family: "Songti SC", "SimSun", serif;
  }
  /* ===== 加载遮罩(来自第二版) ===== */
  .loader {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #08070f; z-index: 9999;
    transition: opacity 0.6s var(--ease), visibility 0.6s var(--ease);
  }
  .loader.hidden { opacity: 0; visibility: hidden; }
  .loader span {
    letter-spacing: 0.3em; font-size: 14px;
    color: #b9a877; opacity: 0.7;
    animation: loader-pulse 1.4s infinite ease-in-out;
  }
  @keyframes loader-pulse {
    0%, 100% { opacity: 0.3; }
    50%      { opacity: 0.9; }
  }
  .viewport {
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    perspective: 1200px;
  }
  /* ===== 方案 C 提亮:整张画板叠加 brightness/contrast/saturate 滤镜
          + 暖色外发光,营造灯箱质感 ===== */
  .artboard {
    position: relative;
    width: min(100vw, calc(100vh * 682 / 1024));
    aspect-ratio: 682 / 1024;
    max-height: 100vh;
    overflow: hidden;
    box-shadow:
      0 24px 80px rgba(0, 0, 0, 0.6),
      0 0 120px rgba(255, 200, 120, 0.18);
    cursor: crosshair;
    filter: brightness(1.10) contrast(1.08) saturate(1.15);
  }
  .parallax {
    position: absolute;
    inset: 0;
    pointer-events: none;
    will-change: transform;
  }
  .layer-img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: fill;
    pointer-events: none;
    user-select: none;
  }
  .base-poster { z-index: 0; }
  .river-wrap {
    z-index: 15;
    mix-blend-mode: screen;
    opacity: 0.88;
    mask-image: url(#river-mask);
    -webkit-mask-image: url(#river-mask);
  }
  .river-wrap .layer-img {
    filter: url(#river-flow);
  }
  .fx {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 200;
  }
  .candle-glow {
    left: 50%;
    top: 19%;
    width: 18%;
    height: 12%;
    transform: translate(-50%, -50%);
    background: radial-gradient(ellipse at center,
      rgba(255, 196, 90, 0.45) 0%,
      rgba(255, 150, 40, 0.12) 55%,
      transparent 72%);
    mix-blend-mode: screen;
    animation: candle-pulse 2.4s ease-in-out infinite;
  }
  @keyframes candle-pulse {
    0%, 100% { opacity: 0.75; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 1; transform: translate(-50%, -54%) scale(1.08); }
  }
  .river-shine {
    left: 36%;
    top: 26%;
    width: 28%;
    height: 58%;
    z-index: 16;
    background: linear-gradient(180deg,
      transparent 0%,
      rgba(255, 230, 160, 0.08) 15%,
      rgba(255, 245, 210, 0.22) 50%,
      rgba(255, 220, 140, 0.1) 85%,
      transparent 100%);
    mix-blend-mode: screen;
    animation: river-glow 2.5s ease-in-out infinite alternate;
    mask-image: url(#river-mask);
    -webkit-mask-image: url(#river-mask);
  }
  .river-shine::after {
    content: "";
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(175deg,
      transparent 0px, transparent 6px,
      rgba(255, 255, 220, 0.2) 10px, transparent 18px);
    background-size: 100% 40px;
    animation: river-streaks 0.9s linear infinite;
  }
  @keyframes river-glow {
    from { opacity: 0.6; }
    to { opacity: 1; }
  }
  @keyframes river-streaks {
    from { background-position: 0 0; }
    to { background-position: 0 40px; }
  }
  /* ===== 第二版风格的静态金河图层 ===== */
  .river-still {
    position: absolute;
    inset: 0;
    z-index: 230;
    background-image: url("layers/home/ubuntu/layers/river_gold.png");
    background-repeat: no-repeat;
    background-position: center;
    background-size: contain;
    opacity: 1;
    mix-blend-mode: screen;
    pointer-events: none;
  }
  #particles, #ripples {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
  #particles { z-index: 210; }
  #ripples { z-index: 205; mix-blend-mode: screen; }
  /* ===== 鼠标聚光灯 ===== */
  .spotlight {
    position: absolute; inset: 0;
    pointer-events: none;
    z-index: 220;
    background: radial-gradient(
      300px circle at var(--mx, 50%) var(--my, 50%),
      rgba(255, 225, 160, 0.18),
      transparent 60%
    );
    mix-blend-mode: screen;
  }
  .hint {
    position: fixed;
    left: 16px;
    bottom: 16px;
    color: #b9a877;
    font-size: 12px;
    opacity: 0.7;
    line-height: 1.5;
    z-index: 300;
    /* 英文文案建议用无衬线字体,显示更整齐 */
    font-family: "Helvetica Neue", "Segoe UI", system-ui, sans-serif;
    letter-spacing: 0.05em;
  }
  @media (prefers-reduced-motion: reduce) {
    .loader, .candle-glow, .river-shine, .river-shine::after { animation: none !important; }
  }
</style>
</head>
<body>
<!-- 加载遮罩 -->
<div class="loader" id="loader"><span>LOADING…</span></div>
<svg width="0" height="0" aria-hidden="true">
  <defs>
    <filter id="river-flow" x="-8%" y="-8%" width="116%" height="116%">
      <feTurbulence id="river-turb" type="fractalNoise"
        baseFrequency="0.018 0.055" numOctaves="2" seed="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="16"
        xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <mask id="river-mask" maskUnits="objectBoundingBox">
      <rect x="0" y="0.24" width="1" height="0.72" fill="#fff"/>
      <ellipse cx="0.47" cy="0.28" rx="0.19" ry="0.09" fill="#fff"/>
      <ellipse cx="0.53" cy="0.4" rx="0.17" ry="0.1" fill="#fff"/>
      <ellipse cx="0.5" cy="0.54" rx="0.19" ry="0.11" fill="#fff"/>
      <ellipse cx="0.48" cy="0.68" rx="0.2" ry="0.11" fill="#fff"/>
      <ellipse cx="0.5" cy="0.82" rx="0.21" ry="0.1" fill="#fff"/>
    </mask>
  </defs>
</svg>
<div class="viewport" id="viewport">
  <div class="artboard" id="artboard">
    <div class="parallax base-poster" data-depth="0.04">
      <img class="layer-img" src="poster.png" alt="">
    </div>
    <div id="sam-layers"></div>
    <div class="parallax river-wrap" data-depth="0.1">
      <img class="layer-img" src="layers/home/ubuntu/layers/river_gold.png" alt="">
    </div>
    <div class="fx candle-glow" aria-hidden="true"></div>
    <div class="fx river-shine" aria-hidden="true"></div>
    <div class="river-still" aria-hidden="true"></div>
    <canvas id="ripples" aria-hidden="true"></canvas>
    <canvas id="particles" class="fx" aria-hidden="true"></canvas>
    <div class="spotlight" id="spotlight" aria-hidden="true"></div>
  </div>
</div>

<!-- ===== 修改:左下角固定文案 ===== -->
<p class="hint" id="hint">Mathematics × Political Civilization × Periods IV-V</p>

<script src="layers/sam/manifest.js"></script>
<script>
(function () {
  var artboard = document.getElementById("artboard");
  var viewport = document.getElementById("viewport");
  var container = document.getElementById("sam-layers");
  var hint = document.getElementById("hint");
  var spotlight = document.getElementById("spotlight");
  var loader = document.getElementById("loader");
  var tx = 0, ty = 0, cx = 0, cy = 0;
  var mx = 50, my = 50;

  /* ===== 修改:把左下角文案设为常量,统一管理 ===== */
  var HINT_TEXT = "Mathematics × Political Civilization × Periods IV-V";

  function preloadAndReveal() {
    var imgs = [
      "poster.png",
      "layers/home/ubuntu/layers/river_gold.png"
    ];
    var samList = window.SAM_LAYER_MANIFEST;
    if (Array.isArray(samList)) {
      samList.forEach(function (cfg) {
        if (cfg && cfg.file) imgs.push("layers/sam/" + cfg.file);
      });
    }
    Promise.all(imgs.map(function (src) {
      var img = new Image();
      img.src = src;
      return (img.decode ? img.decode() : new Promise(function (res) {
        img.onload = img.onerror = res;
      })).catch(function () {});
    })).then(function () {
      loader.classList.add("hidden");
    });
  }
  var riverT = 0;
  var riverTurb = document.getElementById("river-turb");
  function riverFlowLoop() {
    riverT += 0.014;
    var fy = (0.045 + Math.sin(riverT) * 0.012).toFixed(4);
    riverTurb.setAttribute("baseFrequency", "0.016 " + fy);
    riverTurb.setAttribute("seed", String(Math.floor(riverT * 40) % 100));
    requestAnimationFrame(riverFlowLoop);
  }
  riverFlowLoop();

  function mountLayers(layers) {
    layers.forEach(function (cfg, i) {
      var wrap = document.createElement("div");
      wrap.className = "parallax";
      wrap.dataset.depth = String(cfg.depth);
      if (cfg.mirror) wrap.dataset.mirror = "1";
      wrap.style.zIndex = String(10 + i);
      var img = document.createElement("img");
      img.className = "layer-img";
      img.src = "layers/sam/" + cfg.file;
      img.alt = "";
      wrap.appendChild(img);
      container.appendChild(wrap);
    });
    /* ===== 修改:挂载分层成功后仍显示固定文案,而不是“移动鼠标视差 · …” ===== */
    hint.textContent = HINT_TEXT;
  }

  viewport.addEventListener("mousemove", function (e) {
    var r = artboard.getBoundingClientRect();
    if (r.width <= 0) return;
    tx = (e.clientX - r.left) / r.width - 0.5;
    ty = (e.clientY - r.top) / r.height - 0.5;
    mx = ((e.clientX - r.left) / r.width) * 100;
    my = ((e.clientY - r.top) / r.height) * 100;
  });
  viewport.addEventListener("mouseleave", function () {
    tx = 0; ty = 0;
    mx = 50; my = 50;
  });
  function parallaxLoop() {
    cx += (tx - cx) * 0.09;
    cy += (ty - cy) * 0.09;
    artboard.querySelectorAll(".parallax").forEach(function (el) {
      var d = parseFloat(el.dataset.depth || 0);
      var m = el.dataset.mirror ? -1 : 1;
      el.style.transform = "translate3d(" +
        (-cx * d * 55 * m) + "px," + (-cy * d * 40) + "px,0)";
    });
    spotlight.style.setProperty("--mx", mx + "%");
    spotlight.style.setProperty("--my", my + "%");
    requestAnimationFrame(parallaxLoop);
  }
  parallaxLoop();
  var canvas = document.getElementById("particles");
  var ctx = canvas.getContext("2d");
  var dots = [];
  var riverDots = [];
  function inRiver(nx, ny) {
    if (ny < 0.24 || ny > 0.92) return false;
    var rcx = 0.5 + Math.sin(ny * 4.2) * 0.03;
    return Math.abs(nx - rcx) < 0.1;
  }
  function inLandscapeRiver(nx, ny) {
    return nx < 0.5 && ny > 0.55 && ny < 0.84;
  }
  function rippleKind(nx, ny) {
    if (inRiver(nx, ny)) return "gold";
    if (inLandscapeRiver(nx, ny)) return "blue";
    return "bg";
  }
  var rippleCanvas = document.getElementById("ripples");
  var rctx = rippleCanvas.getContext("2d");
  var ripples = [];
  function spawnRipple(clientX, clientY) {
    var r = artboard.getBoundingClientRect();
    if (r.width <= 0) return;
    var x = clientX - r.left;
    var y = clientY - r.top;
    var nx = x / r.width;
    var ny = y / r.height;
    var kind = rippleKind(nx, ny);
    var maxR = kind === "gold" ? 100 : kind === "blue" ? 85 : 75;
    var rings = kind === "gold" ? 5 : 4;
    for (var i = 0; i < rings; i++) {
      ripples.push({
        x: x, y: y, r: 6 + i * 4, maxR: maxR,
        speed: kind === "gold" ? 2.4 : 2,
        life: 1, kind: kind, delay: i * 0.08
      });
    }
    if (kind === "gold") riverT += 0.35;
  }
  function onArtboardPointer(e) {
    if (e.button !== undefined && e.button !== 0) return;
    spawnRipple(e.clientX, e.clientY);
  }
  artboard.addEventListener("click", onArtboardPointer);
  artboard.addEventListener("touchend", function (e) {
    if (!e.changedTouches.length) return;
    var t = e.changedTouches[0];
    spawnRipple(t.clientX, t.clientY);
  });
  function resizeRipples() {
    var r = artboard.getBoundingClientRect();
    rippleCanvas.width = Math.round(r.width * devicePixelRatio);
    rippleCanvas.height = Math.round(r.height * devicePixelRatio);
    rippleCanvas.style.width = r.width + "px";
    rippleCanvas.style.height = r.height + "px";
    rctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  }
  function drawRipples(w, h) {
    rctx.clearRect(0, 0, w, h);
    ripples = ripples.filter(function (rip) {
      if (rip.delay > 0) { rip.delay -= 0.016; return true; }
      rip.r += rip.speed;
      rip.life -= 0.014;
      if (rip.life <= 0 || rip.r > rip.maxR) return false;
      var fade = rip.life * (1 - rip.r / rip.maxR);
      var stroke, width;
      if (rip.kind === "gold") {
        stroke = "rgba(255, 238, 175, " + (fade * 0.75) + ")";
        width = 2.5;
      } else if (rip.kind === "blue") {
        stroke = "rgba(160, 210, 240, " + (fade * 0.65) + ")";
        width = 2;
      } else {
        stroke = "rgba(200, 220, 255, " + (fade * 0.35) + ")";
        width = 1.5;
      }
      rctx.beginPath();
      rctx.arc(rip.x, rip.y, rip.r, 0, Math.PI * 2);
      rctx.strokeStyle = stroke;
      rctx.lineWidth = width * fade;
      rctx.stroke();
      if (rip.kind === "gold" && rip.r < rip.maxR * 0.4) {
        rctx.beginPath();
        rctx.arc(rip.x, rip.y, rip.r * 0.55, 0, Math.PI * 2);
        rctx.strokeStyle = "rgba(255, 255, 220, " + (fade * 0.25) + ")";
        rctx.lineWidth = 1;
        rctx.stroke();
      }
      return true;
    });
  }
  function resizeParticles() {
    var r = artboard.getBoundingClientRect();
    resizeRipples();
    canvas.width = Math.round(r.width * devicePixelRatio);
    canvas.height = Math.round(r.height * devicePixelRatio);
    canvas.style.width = r.width + "px";
    canvas.style.height = r.height + "px";
    ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
    if (!dots.length) {
      dots = Array.from({ length: 35 }, function () {
        return {
          x: Math.random() * r.width,
          y: Math.random() * r.height,
          r: Math.random() * 1.4 + 0.4,
          vy: -(Math.random() * 0.2 + 0.04),
          vx: (Math.random() - 0.5) * 0.1,
          a: Math.random() * 0.35 + 0.15
        };
      });
      riverDots = Array.from({ length: 55 }, function () {
        return {
          t: Math.random(),
          x: 0.46 + Math.random() * 0.08,
          speed: 0.0009 + Math.random() * 0.0014,
          r: Math.random() * 1.8 + 0.6,
          a: Math.random() * 0.5 + 0.35,
          wobble: Math.random() * Math.PI * 2
        };
      });
    }
  }
  function particleLoop() {
    var r = artboard.getBoundingClientRect();
    if (r.width > 0) drawRipples(r.width, r.height);
    if (r.width > 0 && dots.length) {
      ctx.clearRect(0, 0, r.width, r.height);
      dots.forEach(function (d) {
        d.x += d.vx;
        d.y += d.vy;
        if (d.y < -5) { d.y = r.height + 5; d.x = Math.random() * r.width; }
        ctx.beginPath();
        ctx.fillStyle = "rgba(255, 205, 110, " + d.a + ")";
        ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
        ctx.fill();
      });
      riverDots.forEach(function (d) {
        d.t += d.speed;
        if (d.t > 1) { d.t = 0; d.x = 0.46 + Math.random() * 0.08; }
        var ny = d.t;
        var nx = d.x + Math.sin(ny * 9 + d.wobble) * 0.018;
        if (!inRiver(nx, ny)) return;
        var px = nx * r.width;
        var py = ny * r.height;
        ctx.beginPath();
        ctx.fillStyle = "rgba(255, 235, 170, " + d.a + ")";
        ctx.arc(px, py, d.r, 0, Math.PI * 2);
        ctx.fill();
      });
    }
    requestAnimationFrame(particleLoop);
  }
  resizeParticles();
  window.addEventListener("resize", function () {
    dots = [];
    riverDots = [];
    ripples = [];
    resizeParticles();
  });
  resizeRipples();
  particleLoop();
  var layers = window.SAM_LAYER_MANIFEST;
  if (Array.isArray(layers) && layers.length) {
    mountLayers(layers);
  } else {
    /* ===== 修改:即使 SAM 清单缺失,也保持固定文案 ===== */
    hint.textContent = HINT_TEXT;
  }
  preloadAndReveal();
})();
</script>
</body>
</html>
